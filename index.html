<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>P&P Soluciones - Catálogo</title>
  <style>
    body { 
      background-color: #1B2631; 
      color: white; 
      font-family: sans-serif; 
      display: flex; 
      flex-direction: column; 
      align-items: center; 
      justify-content: center; 
      height: 100vh; 
      margin: 0; 
    }
    .loader {
      border: 5px solid #f3f3f3;
      border-top: 5px solid #3498db;
      border-radius: 50%;
      width: 50px;
      height: 50px;
      animation: spin 1s linear infinite;
      margin-bottom: 20px;
    }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
  </style>
  <script>
    // URL DE TU SCRIPT DE GOOGLE (Extraída de tu captura)
    var scriptUrl = "https://script.google.com/macros/s/AKfycbzQpOyrpPXmVuuppSN5J12IXwDngQIPwMFAHKPCSAxUpAuL5jCOlq_TshAtlc9r4B9w-Q/exec";
    
    // Captura los parámetros de la URL de GitHub (ej: ?c=Copiado)
    var params = window.location.search; 
    
    // Redirige al script de Google pegándole esos parámetros
    window.location.replace(scriptUrl + params);
  </script>
</head>
<body>
  <div class="loader"></div>
  <p>Cargando Catálogo...</p>
</body>
</html>
