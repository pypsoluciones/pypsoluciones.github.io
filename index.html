<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>P&P Soluciones - Catálogo</title>
    
    <link rel="icon" type="image/png" href="https://pypsoluciones.github.io/favicon.png"> 

    <style>
        body, html { 
            margin: 0; 
            padding: 0; 
            height: 100%; 
            width: 100%; 
            overflow: hidden; 
            background-color: #1B2631;
        }
        iframe { 
            width: 100%; 
            height: 100%; 
            border: none; 
            display: block; 
        }
    </style>
</head>
<body>
    <script>
        // --- PEGA AQUÍ TU URL NUEVA DE GOOGLE SCRIPT ---
        var scriptUrl = "https://script.google.com/macros/s/AKfycbzwBUjkc9YGp_WD0zEarM3tyxrEVkqjuhUEPplQ9uLFCXSQmyHXcCwuBQW5BwBbJ0ODKQ/exec"; 
        // -----------------------------------------------

        var queryString = window.location.search;
        var iframe = document.createElement('iframe');
        
        iframe.src = scriptUrl + queryString; 
        
        // ESTA LÍNEA ES LA QUE ARREGLA EL BOTÓN COPIAR
        iframe.setAttribute('allow', 'geolocation; microphone; camera; clipboard-write; clipboard-read'); 
        
        document.body.appendChild(iframe);
    </script>
</body>
</html>
