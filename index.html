<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>P&P Soluciones | Catálogo</title>
    
    <link rel="icon" type="image/png" href="https://pypsoluciones.github.io/Favicon%20Centrado%20P&P%20Soluciones.png"> 

    <style>
        body, html { 
            margin: 0; 
            padding: 0; 
            height: 100%; 
            width: 100%; 
            overflow: hidden; 
            background-color: #1B2631;
        }
        iframe { 
            width: 100%; 
            height: 100%; 
            border: none; 
            display: block; 
        }
    </style>
</head>
<body>
    <script>
        // =========================================================================
        // PEGA AQUÍ TU URL NUEVA DE APPS SCRIPT
        var scriptUrl = "https://script.google.com/macros/s/AKfycbzBYb9h94upXI13Hz07lK6aVQCXnPp75E8zyes9tHAWd5K6Xb8_xggxITaViCXQbflLpA/exec"; 
        // =========================================================================

        var queryString = window.location.search;
        var iframe = document.createElement('iframe');
        
        // Agregamos un parámetro para forzar la actualización en Google
        var separator = queryString ? "&" : "?";
        iframe.src = scriptUrl + queryString + separator + "v=4"; 
        
        iframe.setAttribute('allow', 'geolocation; microphone; camera; clipboard-write; clipboard-read; payment; autoplay');
        document.body.appendChild(iframe);
    </script>
</body>
</html>
