<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>P&P Soluciones</title>
    <link rel="icon" type="image/png" href="https://pypsoluciones.github.io/favicon.png"> 
    <style>
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; overflow: hidden; background-color: #1B2631; }
        iframe { width: 100%; height: 100%; border: none; display: block; }
    </style>
</head>
<body>
    <script>
        // PEGA AQUÍ TU URL DE IMPLEMENTACIÓN DE APPS SCRIPT (La que termina en /exec)
        var scriptUrl = "https://script.google.com/macros/s/AKfycbxMYtoFW13UXgzaNcQUN_5caQ01vO5P52eO_To-edjFgA_LR_7FOAgjaUEMm7V46HTeSw/exec"; 

        // Capturar parámetros de la URL (ej: ?c=Copiado)
        var queryString = window.location.search;
        
        // Crear el iframe
        var iframe = document.createElement('iframe');
        // Unir la URL del script con los parámetros
        iframe.src = scriptUrl + queryString;
        
        // Permisos necesarios para que funcione todo dentro del iframe
        iframe.setAttribute('allow', 'geolocation; microphone; camera; clipboard-write; clipboard-read; payment');
        
        document.body.appendChild(iframe);
    </script>
</body>
</html>
